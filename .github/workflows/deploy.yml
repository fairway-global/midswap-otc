name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/midswap-orchestrator

jobs:
  # ── JOB 1: Type-check ────────────────────────────────────────────────────────
  # This is a workspace monorepo — one package-lock.json at the repo root.
  # npm ci must always run from the root; then individual scripts run in their
  # own working-directory.
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: package-lock.json   # root lockfile

      - name: Install all workspace deps
        run: npm ci                                   # runs at repo root

      - name: tsc --noEmit
        run: npm run typecheck
        working-directory: htlc-orchestrator

  # ── JOB 2: Build & push orchestrator Docker image ────────────────────────────
  build-orchestrator:
    name: Build & Push Orchestrator
    runs-on: ubuntu-latest
    needs: typecheck
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=true
            type=sha,prefix=sha-,format=short

      - name: Build and push orchestrator image
        uses: docker/build-push-action@v6
        with:
          # Root context so the Dockerfile can access the root package-lock.json
          context: .
          file: ./htlc-orchestrator/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-to: type=inline

  # ── JOB 3: Build the React UI ─────────────────────────────────────────────────
  build-ui:
    name: Build UI
    runs-on: ubuntu-latest
    needs: typecheck
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: package-lock.json   # root lockfile

      - name: Install all workspace deps
        run: npm ci                                   # runs at repo root

      - name: Cache Compact toolchain
        uses: actions/cache@v4
        with:
          # The installer drops the `compact` wrapper in ~/.local/bin and the
          # toolchain (pulled by `compact update`) under ~/.compact. Cache both.
          # Bump this key (or pin a `compact update <version>` below) when the
          # compiler version needs to change.
          path: |
            ~/.local/bin/compact
            ~/.compact
          key: compact-toolchain-v0.5.1

      - name: Install Compact compiler
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -x "$HOME/.local/bin/compact" ]; then
            curl --proto '=https' --tlsv1.2 -LsSf \
              https://github.com/midnightntwrk/compact/releases/latest/download/compact-installer.sh | sh
          fi
          # Persist PATH for subsequent steps (installer patches ~/.bashrc, which CI doesn't source)
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.local/bin:$PATH"
          # Pull the actual compiler toolchain — the devtools wrapper alone isn't enough.
          compact update
          compact --version

      - name: Compile Compact contracts
        run: |
          npm run compact:htlc
          npm run compact:usdc
        working-directory: contract

      - name: Inject production env vars
        run: |
          cat > htlc-ui/.env.preprod << 'EOF'
          VITE_NETWORK_ID=preprod
          VITE_LOGGING_LEVEL=warn
          VITE_PROOF_SERVER_URI=${{ secrets.VITE_PROOF_SERVER_URI }}
          VITE_BLOCKFROST_API_KEY=${{ secrets.VITE_BLOCKFROST_API_KEY }}
          VITE_ORCHESTRATOR_URL=https://${{ secrets.DOMAIN_NAME }}
          EOF

      - name: Build UI
        run: npm run build
        working-directory: htlc-ui

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: ui-dist
          path: htlc-ui/dist/
          retention-days: 1

  # ── JOB 4: Deploy to GCP VM ───────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-orchestrator, build-ui]
    if: github.event_name == 'push'
    environment: prod

    steps:
      - uses: actions/checkout@v4

      - name: Download UI dist
        uses: actions/download-artifact@v4
        with:
          name: ui-dist
          path: ui-dist/

      - name: Upload UI to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: "ui-dist/*"
          target: "/var/www/midswap"
          strip_components: 1

      - name: Upload docker-compose.yml to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: "deploy/docker-compose.yml"
          target: "/opt/midswap/"
          strip_components: 2

      - name: Upload deploy script to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: "deploy/scripts/deploy.sh"
          target: "/opt/midswap/scripts/"
          strip_components: 2

      - name: Run deploy script on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            bash /opt/midswap/scripts/deploy.sh sha-$(echo "${{ github.sha }}" | cut -c1-7)
