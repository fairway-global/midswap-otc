# /etc/nginx/sites-available/midswap
#
# Nginx config for Midswap on a single GCP VM.
# Handles three responsibilities:
#   1. HTTP → HTTPS redirect (with ACME challenge passthrough for Certbot)
#   2. Serve the compiled React SPA as static files
#   3. Reverse-proxy /api/* and /health to the orchestrator container
#
# After editing this file on the VM:
#   sudo nginx -t && sudo systemctl reload nginx

# ─── HTTP — redirect everything except the ACME challenge ───────────────────
server {
    listen 80;
    listen [::]:80;
    # ⚠ Replace with your actual domain before running certbot
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # Certbot uses this path to prove domain ownership when issuing/renewing
    # certificates. It must work over plain HTTP.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS ───────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # Certificate paths are written by certbot after first issuance.
    # Run: sudo certbot --nginx -d YOUR_DOMAIN -d www.YOUR_DOMAIN
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    # Mozilla-recommended TLS configuration generated by certbot.
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ─────────────────────────────────────────────────────
    # These stop the most common browser-level attacks at zero cost.
    add_header X-Frame-Options         "SAMEORIGIN"                   always;
    add_header X-Content-Type-Options  "nosniff"                      always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy      "geolocation=(), camera=()"    always;

    # ── Static UI files ───────────────────────────────────────────────────────
    # GitHub Actions builds the Vite bundle and SCPs it here.
    root  /var/www/midswap;
    index index.html;

    # SPA routing: any path that doesn't match a real file falls back to
    # index.html so React Router can render the correct component client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Vite fingerprints JS/CSS/WASM filenames with a content hash, so they are
    # safe to cache for a very long time. Browsers won't re-fetch unless the
    # hash in the filename changes (which happens automatically on each build).
    location ~* \.(js|css|wasm|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ZK proof assets (large binary files in /keys and /zkir) use the same
    # immutable-cache strategy because their names include a hash.
    location ~* \.(prover|verifier|bzkir)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── API reverse proxy ─────────────────────────────────────────────────────
    # The orchestrator container listens on 127.0.0.1:4000 (docker-compose.yml
    # binds only to localhost). Nginx forwards /api/* to it and sets the
    # standard proxy headers so the app can see the real client IP.
    location /api/ {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # /health passthrough — useful for uptime monitors (UptimeRobot, etc.)
    location /health {
        proxy_pass http://127.0.0.1:4000;
    }
}
